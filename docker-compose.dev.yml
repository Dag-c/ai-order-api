#docker compose -f docker-compose.dev.yml up --build
services:

  api:

    build: .

    container_name: ia-order-api

    ports:
      - "8000:8000"

    env_file:
      - .env.development

    depends_on:
      - redis

    volumes:
      - .:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  redis:

    image: redis:7

    container_name: redis-server

    ports:
      - "6379:6379"